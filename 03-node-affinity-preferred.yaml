apiVersion: v1
kind: Pod
metadata:
  name: with-node-affinity-preferred
spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - expense
  containers:
  - name: nginx-with-node-affinity
    image: nginx

# Label the node:
# Quick checklist for this to work:

# Label your node:
# kubectl label node ip-192-168-21-201.ec2.internal project=expense

# Create the pod with your YAML file:
# kubectl apply -f 03-node-affinity-preferred.yaml

# Check pod placement and node labels:
# kubectl get pods -o wide
# kubectl get nodes --show-labels

# preferredDuringSchedulingIgnoredDuringExecution sets soft preferences, so nodeSelector (a hard requirement) isn’t needed.